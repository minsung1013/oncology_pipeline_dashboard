<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- magnifying glass handle -->
  <line x1="20.5" y1="20.5" x2="28.5" y2="28.5" stroke="#2563eb" stroke-width="3.6" stroke-linecap="round"/>
  <!-- lens -->
  <circle cx="13" cy="13" r="9.6" fill="#eff6ff" stroke="#2563eb" stroke-width="2.2"/>
  <!-- DNA double helix inside the lens -->
  <g fill="none" stroke-linecap="round">
    <!-- rungs (base pairs) -->
    <line x1="9.2" y1="9.5" x2="16.8" y2="9.5" stroke="#93c5fd" stroke-width="1.3"/>
    <line x1="9.2" y1="16.5" x2="16.8" y2="16.5" stroke="#93c5fd" stroke-width="1.3"/>
    <!-- strand A -->
    <path d="M13 5.8 C16 7 17 8 17 9.5 C17 11 16 12 13 13 C10 14 9 15 9 16.5 C9 18 10 19 13 20.2"
          stroke="#2563eb" stroke-width="1.7"/>
    <!-- strand B -->
    <path d="M13 5.8 C10 7 9 8 9 9.5 C9 11 10 12 13 13 C16 14 17 15 17 16.5 C17 18 16 19 13 20.2"
          stroke="#7c3aed" stroke-width="1.7"/>
  </g>
</svg>
