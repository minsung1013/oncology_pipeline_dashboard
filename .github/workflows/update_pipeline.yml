name: Update Oncology Data (pipeline + publications)

on:
  # drug_id 안정화(sha1 결정적 해시) + 캐시 마이그레이션 완료 → cron 복구.
  # 재파싱해도 drug_id가 동일해 한국어 요약이 캐시에서 그대로 재적용됨(소실 위험 제거).
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC (09:00 KST)
  workflow_dispatch:

# 필요 시크릿 (Settings > Secrets and variables > Actions):
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_BASE_URL
# 데이터는 git에 커밋하지 않고 Cloudflare R2로 업로드 (frontend가 R2에서 fetch).
#
# 주간 갱신 범위:
#   - Clinical pipeline (ClinicalTrials.gov) 전체 재수집
#   - Publications (PubMed) 현재 연도 재수집 + OpenAlex 저자/소속/회사 보강
#   - 학회 초록은 행사 기반(연 1회성)이라 주간 재수집 안 함 — parsed 번들에서 유지
#     (새 학회는 로컬에서 LLM 요약과 함께 갱신)
#   - LLM 한국어 요약은 Ollama(로컬 GPU) 필요 → CI는 기존 값 유지(번들), 신규분은 로컬 보강

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_BASE_URL: ${{ secrets.R2_BASE_URL }}
      OPENALEX_KEY: ${{ secrets.OPENALEX_KEY }}  # OpenAlex 무료 $1/일 키 (없으면 보강 429)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 과거 parsed 코퍼스(학회 초록 + 논문, 한국어 요약 포함)를 R2에서 받아옴
      - name: Pull parsed corpus from R2
        run: |
          python scripts/sync_parsed.py download "${R2_BASE_URL}" || \
            echo "(no parsed corpus yet — conference/older pubs may be missing)"

      # 증분 논문매칭 베이스: 직전 pipeline.json
      - name: Pull previous pipeline.json from R2
        run: |
          mkdir -p data/parsed
          curl -fsSL "${R2_BASE_URL}/pipeline.json" -o data/parsed/pipeline.json || \
            echo "(no previous pipeline.json — full build)"

      - name: Refresh clinical pipeline (ClinicalTrials.gov)
        run: python scripts/run_pipeline.py --mode full

      # 현재 + 직전 연도 재수집 — 논문은 출판 후에도 PubMed 색인/NCT 링크가 지연되어
      # 붙는 경우가 많아 직전 연도까지 갱신해야 누락이 안 생긴다 (연말 경계도 자동 처리).
      - name: Refresh recent publications (PubMed + OpenAlex)
        run: |
          YEAR=$(date -u +%Y)
          PREV=$((YEAR - 1))
          python scripts/fetch_publications.py --years "$PREV" "$YEAR"
          python scripts/enrich_pub_authors.py --glob "data/parsed/publications_${PREV}.json"
          python scripts/enrich_pub_authors.py --glob "data/parsed/publications_${YEAR}.json"

      # 커밋된 LLM 캐시 재적용 — CI엔 Ollama가 없어 신규 생성은 못 하지만, 이미 만들어둔
      # 분류·요약을 키(약물명/uid/drug_id) 기준으로 되살린다. 이 재적용이 없으면 매주 재수집 시
      # 한국어 요약(논문·임상시험)과 LLM modality/target/biomarker가 통째로 사라진다(회귀 방지).
      - name: Re-apply enrichment + normalize
        run: |
          python scripts/llm_merge.py --write || true                 # drugs: modality/target/biomarker
          python scripts/llm_merge.py --mode abstracts --write || true # 학회초록 + 논문 한국어 요약
          python scripts/llm_merge.py --mode pipeline --write || true  # 임상시험 한국어 요약
          python scripts/llm_merge.py --mode xref --write || true      # 크로스소스 채움/교정
          python scripts/normalize_fields.py --write || true

      # whatsnew 델타용 직전 스냅샷 (신규 논문 PMID 차이 산정)
      - name: Pull previous snapshot from R2
        run: |
          mkdir -p data/frontend
          curl -fsSL --compressed "${R2_BASE_URL}/snapshot.json" -o data/frontend/snapshot.json || \
            echo "(no prior snapshot — first whatsnew baseline)"

      - name: Build lite frontend payload (full)
        run: python scripts/make_frontend_data.py

      - name: Upload frontend + parsed corpus to R2
        run: |
          python scripts/upload_r2.py
          python scripts/sync_parsed.py upload

      # 갱신된 LLM 약물 캐시(신규 분류)만 git에 커밋 (소형)
      - name: Commit LLM cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/llm_drug_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: refresh data $(date +'%Y-%m-%d')"
          git push || true
