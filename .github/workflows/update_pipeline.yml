name: Update Oncology Pipeline Data

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC (09:00 KST)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # 안전장치 (증분 매칭이면 보통 20~30분)

    permissions:
      contents: write       # data/ 커밋 & 푸시 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 증분 매칭: 기존 data/parsed/pipeline.json(커밋됨)의 논문 데이터를
      # 보존하고, 새로 등록된 trial만 Europe PMC로 검색.
      - name: Run pipeline (full fetch + incremental paper matching)
        run: python scripts/run_pipeline.py --mode full
        working-directory: ${{ github.workspace }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/parsed/pipeline.json
          git diff --staged --quiet || git commit -m "chore: update pipeline data $(date +'%Y-%m-%d')"
          git push
