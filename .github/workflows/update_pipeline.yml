name: Update Oncology Pipeline Data

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC (09:00 KST)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # data/ 커밋 & 푸시 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (auto mode — full if no prior dump, delta otherwise)
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/run_pipeline.py --mode auto
        working-directory: ${{ github.workspace }}

      - name: Copy pipeline.json to frontend public/
        run: cp data/parsed/pipeline.json frontend/public/pipeline.json

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/parsed/pipeline.json frontend/public/pipeline.json
          git diff --staged --quiet || git commit -m "chore: update pipeline data $(date +'%Y-%m-%d')"
          git push
